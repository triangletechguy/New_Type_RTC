<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>We 4 Humanity SVG Icons Preview</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1b0e0b;font-family:Arial,sans-serif;color:white;}
  .wrap{display:flex;gap:14px;flex-wrap:wrap;max-width:820px;justify-content:center;}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;background:rgba(0,0,0,.44);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);font-weight:700;font-size:16px;}
  img{width:20px;height:20px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="btn"><img src="refresh.svg" alt="">Refresh</div>
    <div class="btn"><img src="voice.svg" alt="">Voice</div>
    <div class="btn"><img src="playlist.svg" alt="">Play List</div>
    <div class="btn"><img src="power.svg" alt="">Power</div>
    <div class="btn"><img src="share.svg" alt="">Share</div>
    <div class="btn"><img src="more.svg" alt="">More</div>
  </div>
</body>
</html>
