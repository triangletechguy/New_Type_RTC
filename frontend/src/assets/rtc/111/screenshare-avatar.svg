  <path d="M53 60L64 49L75 60" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="92" cy="36" r="7" fill="#8BE7FF" filter="url(#glow)"/>
