<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">

  <defs>
    <linearGradient id="bg" x1="16" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2142"/>
      <stop offset="0.52" stop-color="#14152E"/>
      <stop offset="1" stop-color="#0B0D20"/>
    </linearGradient>
    <linearGradient id="stroke" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8C7BFF"/>
      <stop offset="1" stop-color="#4B3C89"/>
    </linearGradient>
    <linearGradient id="accent" x1="34" y1="28" x2="96" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#CFC7FF"/>
      <stop offset="1" stop-color="#8BE7FF"/>
    </linearGradient>
    <linearGradient id="hot" x1="80" y1="20" x2="110" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7CA8"/>
      <stop offset="1" stop-color="#FF526F"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="108" height="108" rx="26" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="10.75" y="10.75" width="106.5" height="106.5" rx="25.25" stroke="url(#stroke)" stroke-width="1.5" opacity="0.95"/>
  <path d="M28 18H76C99.2 18 110 28.8 110 52V100" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" stroke-linecap="round"/>

  <title>Screen share avatar</title>
  <circle cx="64" cy="64" r="38" fill="#55D6FF" opacity="0.09"/>
  <rect x="32" y="38" width="64" height="43" rx="9" stroke="url(#accent)" stroke-width="5"/>
