map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name chadnichok.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/rtc-enterprise;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chadnichok.com;

    ssl_certificate /etc/letsencrypt/live/chadnichok.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chadnichok.com/privkey.pem;

    root /var/www/rtc-enterprise;
    index index.html;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
        try_files $uri =404;
    }

    location = /mobile-room-reference.mp4 {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
        try_files $uri $uri/ /index.html;
    }
}
